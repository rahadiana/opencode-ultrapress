name: Publish to npm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:   # Manual trigger from Actions tab

jobs:
  publish:
    # Only publish if CI passed OR triggered manually
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag: $TAG_VERSION — syncing to package.json"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Show version
        run: node -e "console.log('Publishing version:', require('./package.json').version)"

      - run: bun install

      - run: bun run build

      - name: Publish to npm
        id: publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @rahadiana/opencode-ultrapress@$VERSION version &>/dev/null; then
            echo "Version $VERSION already published — skipping."
            echo "published=false" >> $GITHUB_OUTPUT
          else
            npm publish --access public
            echo "published=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            --target "${{ github.sha }}"
