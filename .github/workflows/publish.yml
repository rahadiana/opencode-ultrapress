name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # Trigger on version tags (v0.2.0, v1.0.0, etc.)
  workflow_dispatch:   # Manual trigger from Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag: $TAG_VERSION — syncing to package.json"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Show version (manual)
        if: github.event_name == 'workflow_dispatch'
        run: node -e "console.log('Manual publish — version:', require('./package.json').version)"

      - run: bun install

      - run: bun run lint

      - run: bun run build

      - run: bun test

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @rahadiana/opencode-ultrapress@$VERSION version &>/dev/null; then
            echo "Version $VERSION already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
