<svg viewBox="0 0 1280 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow-c" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
    <feFlood flood-color="#00d4ff" flood-opacity="0.9" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="sh"/>
    <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-p" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
    <feFlood flood-color="#8b5cf6" flood-opacity="0.9" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="sh"/>
    <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
    <feFlood flood-color="#00ff9f" flood-opacity="0.9" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="sh"/>
    <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-a" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#f59e0b" flood-opacity="0.9" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="sh"/>
    <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#04060d"/>
    <stop offset="50%" stop-color="#07091a"/>
    <stop offset="100%" stop-color="#04060d"/>
  </linearGradient>
  <linearGradient id="bar-blue" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#004d7a"/>
  </linearGradient>
  <linearGradient id="bar-green" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00ff9f"/>
    <stop offset="100%" stop-color="#006644"/>
  </linearGradient>
  <linearGradient id="title-grad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00e5ff"/>
    <stop offset="100%" stop-color="#0099cc"/>
  </linearGradient>
  <clipPath id="right-clip">
    <rect x="720" y="0" width="560" height="460"/>
  </clipPath>
  <clipPath id="left-clip">
    <rect x="0" y="0" width="720" height="460"/>
  </clipPath>
</defs>

